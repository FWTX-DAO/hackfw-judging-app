# Fly.io deploy config for HackFW judging app.
# `fly launch --copy-config --no-deploy` to wire this up; rename app first.
#
# Critical pieces:
#  - mounted volume at /data so SQLite + WAL survive restarts
#  - min_machines_running = 1 so live judging never cold-starts mid-event
#  - SESSION_SECRET + ADMIN_PIN must be set as Fly secrets (not in [env])

app = "hackfw-judging"
primary_region = "dfw"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DB_FILE = "/data/hackathon.db"

[[mounts]]
  source = "hackfw_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 400

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
